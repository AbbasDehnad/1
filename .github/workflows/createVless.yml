name: Create VLESS + TLS inbound

on:
  push:
      branches:
        - main
  workflow_dispatch:

jobs:
  create-inbound:
    runs-on: ubuntu-latest
    steps:
      - name: Setup VLESS inbound on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          timeout: 10m
          command_timeout: 10m
          script: |
            set +e
            export PATH="/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:$PATH"

            # --- 1. Install jq if needed ---
            if ! command -v jq &>/dev/null; then
              echo ">>> Installing jq..."
              sudo apt update -qq && sudo apt install -y -qq jq
            fi

            # --- 2. Get panel info ---
            echo "=== Panel info ==="
            PANEL_INFO=$(x-ui settings)
            PANEL_PORT=$(echo "$PANEL_INFO" | grep -oP 'port: \K\d+')
            WEB_BASE=$(echo "$PANEL_INFO" | grep -oP 'webBasePath: \K\S+')
            WEB_BASE="${WEB_BASE%/}"   # remove trailing slash
            BASE_URL="http://127.0.0.1:${PANEL_PORT}${WEB_BASE}"
            echo "Panel URL: $BASE_URL"

            # --- 3. Login with HTTP/1.0 (fixes "Unsupported HTTP version") ---
            echo "=== Login ==="
            LOGIN_JSON=$(jq -n \
              --arg u "$USER_3XUI" \
              --arg p "$PASS_3XUI" \
              '{username: $u, password: $p}')
            echo "Sending login request..."

            RESPONSE_TMP=$(mktemp)
            COOKIE_TMP="/tmp/cookie.txt"
            rm -f "$COOKIE_TMP"

            # Use --http1.0 and full verbose for debugging
            CURL_EXIT=0
            curl --http1.0 -v -s -w "\n%{http_code}" -o "$RESPONSE_TMP" -c "$COOKIE_TMP" \
              "${BASE_URL}/login" \
              -H "Content-Type: application/json" \
              --data-binary "$LOGIN_JSON" 2>/tmp/login_stderr.txt
            CURL_EXIT=$?

            HTTP_CODE=$(tail -n1 "$RESPONSE_TMP")
            RESPONSE_BODY=$(head -n -1 "$RESPONSE_TMP")

            echo "Curl exit code: $CURL_EXIT"
            echo "HTTP Status: $HTTP_CODE"
            echo "Response body:"
            echo "$RESPONSE_BODY"

            if [ $CURL_EXIT -ne 0 ]; then
              echo "❌ Curl failed. Verbose stderr:"
              cat /tmp/login_stderr.txt
              exit 1
            fi

            # Detect success
            SUCCESS=false
            if echo "$RESPONSE_BODY" | jq -e '.success == true' &>/dev/null; then
              SUCCESS=true
            elif [ "$HTTP_CODE" = "200" ] && [ -s "$COOKIE_TMP" ]; then
              SUCCESS=true
            elif echo "$RESPONSE_BODY" | grep -qi "success"; then
              SUCCESS=true
            fi

            if [ "$SUCCESS" = false ]; then
              echo "❌ Login failed."
              exit 1
            fi
            echo "✔ Logged in successfully."

            # --- 4. Open port 80 (if needed) ---
            if command -v ufw &>/dev/null && sudo ufw status | grep -qw active; then
              if ! sudo ufw status | grep -q "80/tcp.*ALLOW"; then
                sudo ufw allow 80/tcp
              fi
            fi

            # --- 5. Obtain Let's Encrypt certificate ---
            DOMAIN="aparat.coursevideo.ir"
            EMAIL="admin@${DOMAIN}"
            echo "=== Requesting certificate for $DOMAIN ==="
            CERT_RESP=$(curl -s -b "$COOKIE_TMP" -X POST "${BASE_URL}/panel/api/inbounds/generateCert" \
              -H "Content-Type: application/json" \
              -d "{\"domains\":[\"$DOMAIN\"],\"email\":\"$EMAIL\"}")
            echo "Certificate response: $CERT_RESP"
            CERT_FILE=$(echo "$CERT_RESP" | jq -r '.data.certFile')
            KEY_FILE=$(echo "$CERT_RESP" | jq -r '.data.keyFile')
            if [ "$CERT_FILE" = "null" ] || [ -z "$CERT_FILE" ]; then
              echo "❌ Certificate generation failed."
              exit 1
            fi
            echo "✔ Certificate: cert=$CERT_FILE key=$KEY_FILE"

            # --- 6. Choose port ---
            DESIRED_PORT=443
            if ss -tlnp | grep -q ":$DESIRED_PORT "; then
              INBOUND_PORT=8443
            else
              INBOUND_PORT=$DESIRED_PORT
            fi

            # --- 7. Create VLESS inbound ---
            CLIENT_UUID=$(cat /proc/sys/kernel/random/uuid)
            echo "=== Creating inbound on port $INBOUND_PORT ==="
            PAYLOAD=$(jq -n \
              --arg port "$INBOUND_PORT" \
              --arg uuid "$CLIENT_UUID" \
              --arg domain "$DOMAIN" \
              --arg certFile "$CERT_FILE" \
              --arg keyFile "$KEY_FILE" \
              '{
                up: 0, down: 0, total: 0, remark: $domain, enable: true, expiryTime: 0,
                listen: "", port: ($port | tonumber), protocol: "vless",
                settings: "{\"clients\":[{\"id\":\"\($uuid)\",\"flow\":\"\"}],\"decryption\":\"none\",\"fallbacks\":[]}",
                streamSettings: "{\"network\":\"tcp\",\"security\":\"tls\",\"tlsSettings\":{\"serverName\":\"\($domain)\",\"certificates\":[{\"certificateFile\":\"\($certFile)\",\"keyFile\":\"\($keyFile)\"}]}}",
                sniffing: "{\"enabled\":true,\"destOverride\":[\"http\",\"tls\"]}"
              }')

            ADD_RESP=$(curl -s -b "$COOKIE_TMP" -X POST "${BASE_URL}/panel/api/inbounds/add" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            echo "Add inbound response: $ADD_RESP"
            INBOUND_ID=$(echo "$ADD_RESP" | jq -r '.data.id')
            if [ "$INBOUND_ID" = "null" ] || [ -z "$INBOUND_ID" ]; then
              echo "❌ Failed to create inbound."
              exit 1
            fi
            echo "✔ Inbound created (id=$INBOUND_ID)"

            # --- 8. Get share link ---
            SHARE_RESP=$(curl -s -b "$COOKIE_TMP" "${BASE_URL}/panel/api/inbounds/share/${INBOUND_ID}")
            VLESS_LINK=$(echo "$SHARE_RESP" | jq -r '.data')
            if [ "$VLESS_LINK" = "null" ] || [ -z "$VLESS_LINK" ]; then
              VLESS_LINK="vless://${CLIENT_UUID}@${DOMAIN}:${INBOUND_PORT}?type=tcp&security=tls&sni=${DOMAIN}#${DOMAIN}"
            fi

            echo ""
            echo "=========================================="
            echo "VLESS LINK:"
            echo "$VLESS_LINK"
            echo "=========================================="

            rm -f "$RESPONSE_TMP" "$COOKIE_TMP" /tmp/login_stderr.txt
        env:
          USER_3XUI: ${{ secrets.USER_3XUI }}
          PASS_3XUI: ${{ secrets.PASS_3XUI }}
