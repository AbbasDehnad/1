name: Create VLESS + TLS inbound

on:
  push:
      branches:
        - main
  workflow_dispatch:

jobs:
  create-inbound:
    runs-on: ubuntu-latest
    steps:
      - name: Setup VLESS inbound on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          timeout: 10m
          command_timeout: 10m
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:$PATH"

            # Install jq if missing
            if ! command -v jq &>/dev/null; then
              echo ">>> Installing jq..."
              sudo apt update -qq && sudo apt install -y -qq jq
            fi

            # --- 1. Get panel connection info ---
            echo "=== Getting panel connection info ==="
            PANEL_INFO=$(x-ui settings)
            PANEL_PORT=$(echo "$PANEL_INFO" | grep -oP 'port: \K\d+')
            WEB_BASE=$(echo "$PANEL_INFO" | grep -oP 'webBasePath: \K\S+')
            BASE_URL="http://127.0.0.1:${PANEL_PORT}${WEB_BASE}"
            echo "Panel URL: $BASE_URL"

            # --- 2. Login with verbose output ---
            echo "=== Logging into 3x-ui panel ==="
            LOGIN_JSON=$(jq -n \
              --arg u "$USER_3XUI" \
              --arg p "$PASS_3XUI" \
              '{username: $u, password: $p}')
            echo "Sending login request..."

            # Capture HTTP status and body
            LOGIN_RESPONSE=$(curl -s -w "\n%{http_code}" -c /tmp/cookie.txt -X POST "${BASE_URL}/login" \
              -H "Content-Type: application/json" \
              --data-binary "$LOGIN_JSON")

            # Split body and status code
            HTTP_BODY=$(echo "$LOGIN_RESPONSE" | sed '$d')
            HTTP_CODE=$(echo "$LOGIN_RESPONSE" | tail -n1)

            echo "HTTP Status: $HTTP_CODE"
            echo "Response body:"
            echo "$HTTP_BODY"

            # Check for success (several possible indicators)
            SUCCESS=false
            if echo "$HTTP_BODY" | jq -e '.success == true' &>/dev/null; then
              SUCCESS=true
            elif [ "$HTTP_CODE" = "200" ] && [ -s /tmp/cookie.txt ]; then
              # Some versions set a cookie on successful login without explicit JSON flag
              SUCCESS=true
            elif echo "$HTTP_BODY" | grep -q "login success"; then
              SUCCESS=true
            fi

            if [ "$SUCCESS" = false ]; then
              echo "❌ Login failed. Check your credentials or panel API version."
              exit 1
            fi
            echo "✔ Logged in successfully."

            # --- 3. Ensure port 80 is open for ACME ---
            echo "=== Checking port 80 ==="
            if command -v ufw &>/dev/null && sudo ufw status | grep -qw active; then
              if ! sudo ufw status | grep -q "80/tcp.*ALLOW"; then
                echo ">>> Allowing port 80/tcp temporarily..."
                sudo ufw allow 80/tcp
              fi
            fi

            # --- 4. Request certificate ---
            DOMAIN="aparat.coursevideo.ir"
            EMAIL="admin@${DOMAIN}"

            echo "=== Requesting certificate for $DOMAIN ==="
            CERT_RESP=$(curl -s -b /tmp/cookie.txt -X POST "${BASE_URL}/panel/api/inbounds/generateCert" \
              -H "Content-Type: application/json" \
              -d "{\"domains\":[\"$DOMAIN\"],\"email\":\"$EMAIL\"}")
            echo "Certificate response: $CERT_RESP"

            CERT_FILE=$(echo "$CERT_RESP" | jq -r '.data.certFile')
            KEY_FILE=$(echo "$CERT_RESP" | jq -r '.data.keyFile')
            if [ "$CERT_FILE" = "null" ] || [ -z "$CERT_FILE" ]; then
              echo "❌ Certificate generation failed. Ensure domain $DOMAIN points to this VPS and port 80 is open."
              exit 1
            fi
            echo "✔ Certificate saved: cert=$CERT_FILE key=$KEY_FILE"

            # --- 5. Choose port ---
            DESIRED_PORT=443
            if ss -tlnp | grep -q ":$DESIRED_PORT "; then
              echo "Port $DESIRED_PORT in use, falling back to 8443."
              INBOUND_PORT=8443
            else
              INBOUND_PORT=$DESIRED_PORT
            fi

            # --- 6. Create VLESS inbound ---
            CLIENT_UUID=$(cat /proc/sys/kernel/random/uuid)
            echo "=== Creating inbound on port $INBOUND_PORT ==="
            PAYLOAD=$(jq -n \
              --arg port "$INBOUND_PORT" \
              --arg uuid "$CLIENT_UUID" \
              --arg domain "$DOMAIN" \
              --arg certFile "$CERT_FILE" \
              --arg keyFile "$KEY_FILE" \
              '{
                up: 0,
                down: 0,
                total: 0,
                remark: $domain,
                enable: true,
                expiryTime: 0,
                listen: "",
                port: ($port | tonumber),
                protocol: "vless",
                settings: "{\"clients\":[{\"id\":\"\($uuid)\",\"flow\":\"\"}],\"decryption\":\"none\",\"fallbacks\":[]}",
                streamSettings: "{\"network\":\"tcp\",\"security\":\"tls\",\"tlsSettings\":{\"serverName\":\"\($domain)\",\"certificates\":[{\"certificateFile\":\"\($certFile)\",\"keyFile\":\"\($keyFile)\"}]}}",
                sniffing: "{\"enabled\":true,\"destOverride\":[\"http\",\"tls\"]}"
              }')

            ADD_RESP=$(curl -s -b /tmp/cookie.txt -X POST "${BASE_URL}/panel/api/inbounds/add" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            echo "Add inbound response: $ADD_RESP"
            INBOUND_ID=$(echo "$ADD_RESP" | jq -r '.data.id')
            if [ "$INBOUND_ID" = "null" ] || [ -z "$INBOUND_ID" ]; then
              echo "❌ Failed to create inbound."
              exit 1
            fi
            echo "✔ Inbound created with id=$INBOUND_ID"

            # --- 7. Get share link ---
            SHARE_RESP=$(curl -s -b /tmp/cookie.txt "${BASE_URL}/panel/api/inbounds/share/${INBOUND_ID}")
            VLESS_LINK=$(echo "$SHARE_RESP" | jq -r '.data')
            if [ "$VLESS_LINK" = "null" ] || [ -z "$VLESS_LINK" ]; then
              VLESS_LINK="vless://${CLIENT_UUID}@${DOMAIN}:${INBOUND_PORT}?type=tcp&security=tls&sni=${DOMAIN}#${DOMAIN}"
            fi

            echo ""
            echo "=========================================="
            echo "VLESS LINK:"
            echo "$VLESS_LINK"
            echo "=========================================="

            rm -f /tmp/cookie.txt
        env:
          USER_3XUI: ${{ secrets.USER_3XUI }}
          PASS_3XUI: ${{ secrets.PASS_3XUI }}
